<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archive | Rhevaldy Octavian Haris</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts (Disamakan dengan index.html) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        impact: ['Impact', 'Haettenschweiler', 'Arial Narrow Bold', 'sans-serif'],
                        body: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        dark: '#050505',
                        borderline: '#222222',
                        highlight: '#FF4500', // Orange kemerahan
                        muted: '#666666'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            width: 100%;
            -webkit-font-smoothing: antialiased;
        }

        /* Tipografi Brutalist */
        .text-impact {
            font-family: 'Impact', sans-serif;
            text-transform: uppercase;
            line-height: 0.85;
            letter-spacing: 0.02em;
        }

        /* Efek Teks Tembus Pandang untuk Angka Besar */
        .text-outline {
            color: transparent;
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.1);
        }

        /* Efek Grain/Noise Latar Belakang */
        .noise-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Animasi Accordion Menggunakan JS ScrollHeight (Sangat Mulus & Ringan) */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
            opacity: 0;
        }

        .icon-rotate {
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-highlight selection:text-white relative">

    <div class="noise-bg"></div>

    <!-- Navbar Minimalis -->
    <nav class="w-full px-6 py-6 border-b border-borderline relative z-20">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 text-white hover:text-highlight transition-colors group">
                <div class="border border-white p-1 rounded-full group-hover:border-highlight transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                </div>
                <span class="text-[10px] md:text-xs font-bold uppercase tracking-[0.2em] mt-0.5">Kembali</span>
            </a>
            
            <span class="font-impact text-xl md:text-2xl tracking-widest uppercase text-white">
                ARCHIVE.
            </span>
        </div>
    </nav>

    <!-- Header Halaman bergaya Brutalist -->
    <header class="px-6 pt-16 md:pt-24 pb-12 md:pb-16 max-w-[1400px] mx-auto w-full relative z-20">
        <h1 class="text-impact text-[15vw] md:text-[8rem] lg:text-[10rem] leading-[0.8] text-white tracking-normal mb-6 md:mb-10 uppercase break-words select-all">
            PROJECT<br><span class="text-highlight">ARCHIVE.</span>
        </h1>
        <p class="text-[10px] md:text-xs font-bold uppercase tracking-[0.3em] text-gray-400 max-w-lg border-t border-borderline pt-6">
            Arsip seluruh riwayat eksperimen, koding, dan dokumentasi project saya.
        </p>
    </header>

    <!-- Tempat Daftar Kategori Dirender -->
    <main class="flex-grow px-6 pb-32 max-w-[1400px] mx-auto w-full relative z-20">
        <!-- Loading State -->
        <div id="loading" class="text-center py-20">
            <div class="inline-block border border-borderline px-6 py-3 text-highlight uppercase tracking-[0.3em] text-xs font-bold animate-pulse">
                Memuat Data Arsip...
            </div>
        </div>
        
        <div id="archive-container" class="border-t-2 border-borderline hidden">
            <!-- Konten akan otomatis digenerate dari archive.json -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="px-6 py-8 border-t border-borderline text-center bg-highlight text-black relative z-20">
        <p class="text-[9px] md:text-[10px] font-bold uppercase tracking-[0.3em]">
            &copy; 2026 RHEVALDY OCTAVIAN HARIS &bull; JEPARA, ID
        </p>
    </footer>

    <script>
        // 1. Inisialisasi Awal Ikon
        lucide.createIcons();

        // 2. Mengambil Data Konfigurasi secara Dinamis dari archive.json
        document.addEventListener("DOMContentLoaded", () => {
            fetch('archive.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Gagal memuat file archive.json");
                    }
                    return response.json();
                })
                .then(data => {
                    renderArchive(data);
                })
                .catch(error => {
                    console.error(error);
                    document.getElementById('loading').innerHTML = `
                        <div class="border border-red-500 bg-red-500/10 text-red-500 p-6 text-center">
                            <h3 class="text-impact text-2xl mb-2">ERROR LOADING DATA</h3>
                            <span class="text-xs font-bold uppercase tracking-widest text-white">Pastikan file archive.json sudah ditaruh di folder yang sama.</span>
                        </div>
                    `;
                });
        });

        // 3. Fungsi Render HTML berdasarkan Data JSON
        function renderArchive(archiveData) {
            const container = document.getElementById('archive-container');
            const loading = document.getElementById('loading');
            
            // Pengganti jika gambar lokal belum diunggah - Disesuaikan dengan desain baru
            const fallbackFn = "this.onerror=null; this.outerHTML='<div class=\\'w-full aspect-video flex flex-col items-center justify-center bg-[#0a0a0a] border border-dashed border-[#333] text-[#555] p-4 text-center\\'><i data-lucide=\\'image-off\\' class=\\'w-8 h-8 mb-2\\'></i><span class=\\'text-[9px] font-bold uppercase tracking-widest break-all\\'>'+this.getAttribute('data-filename')+' Missing</span></div>'; setTimeout(() => lucide.createIcons(), 100);";

            let htmlContent = '';

            archiveData.forEach((category, catIndex) => {
                let projectsHtml = '';
                
                category.projects.forEach((project, projIndex) => {
                    let imagesHtml = '';
                    
                    project.images.forEach(imgName => {
                        const imgPath = `upload/${category.folderName}/${imgName}`;
                        imagesHtml += `
                            <div class="mb-4 overflow-hidden border border-borderline">
                                <img src="${imgPath}" data-filename="${imgName}" onerror="${fallbackFn}" alt="${project.title}" class="w-full object-cover bg-dark hover:scale-105 transition-transform duration-500">
                            </div>
                        `;
                    });

                    // Format angka urutan project (contoh: 01, 02)
                    const formattedNum = String(projIndex + 1).padStart(2, '0');

                    // Desain Grid Project Baru (Brutalist)
                    projectsHtml += `
                        <div class="mb-20 last:mb-0 md:grid md:grid-cols-12 md:gap-12 pt-10 border-t border-borderline first:border-t-0 first:pt-0 group relative">
                            
                            <!-- Angka Background Raksasa -->
                            <div class="hidden md:block absolute -top-16 -left-8 text-[12rem] font-impact text-outline z-0 pointer-events-none group-hover:text-highlight group-hover:opacity-10 transition-colors duration-500 select-none">
                                ${formattedNum}
                            </div>

                            <!-- Informasi Project (Kiri) -->
                            <div class="md:col-span-5 mb-8 md:mb-0 relative z-10">
                                <div class="flex items-end gap-4 mb-4">
                                    <span class="md:hidden text-impact text-5xl text-highlight leading-none">${formattedNum}</span>
                                    <h4 class="text-impact text-3xl md:text-4xl text-white leading-[0.9] group-hover:text-highlight transition-colors">
                                        ${project.title}
                                    </h4>
                                </div>
                                <div class="inline-block bg-white text-black px-3 py-1.5 text-[9px] font-bold uppercase tracking-[0.2em] mb-6">
                                    Project Detail
                                </div>
                                <p class="text-xs md:text-sm text-gray-400 leading-relaxed font-medium">
                                    ${project.description}
                                </p>
                            </div>
                            
                            <!-- Galeri Gambar Project (Kanan) -->
                            <div class="md:col-span-7 grid grid-cols-1 sm:grid-cols-2 gap-4 relative z-10">
                                ${imagesHtml}
                            </div>
                        </div>
                    `;
                });

                // Desain Header Accordion Kategori (Membentang penuh dan tebal)
                htmlContent += `
                    <div class="border-b-2 border-borderline">
                        <!-- Tombol Header Kategori -->
                        <button class="w-full flex items-center justify-between py-8 md:py-12 text-left focus:outline-none group hover:bg-[#0a0a0a] transition-colors px-2 md:px-6" onclick="toggleAccordion('content-${category.id}', 'icon-${category.id}')">
                            <div class="flex flex-col md:flex-row md:items-end gap-2 md:gap-6">
                                <h3 class="text-impact text-4xl md:text-6xl text-white group-hover:text-highlight transition-colors leading-none tracking-wide">
                                    ${category.title}
                                </h3>
                                <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-500 mb-1 md:mb-2">
                                    [ ${category.projects.length} PROJECTS ]
                                </p>
                            </div>
                            <div id="icon-${category.id}" class="icon-rotate w-10 h-10 md:w-14 md:h-14 rounded-full border-2 border-borderline flex items-center justify-center text-white group-hover:border-highlight group-hover:text-highlight transition-all flex-shrink-0">
                                <i data-lucide="plus" class="w-5 h-5 md:w-7 md:h-7"></i>
                            </div>
                        </button>
                        
                        <!-- Panel Konten Project -->
                        <div id="content-${category.id}" class="accordion-content px-2 md:px-6">
                            <div class="pb-12 pt-10">
                                ${projectsHtml}
                            </div>
                        </div>
                    </div>
                `;
            });

            // Ganti konten wadah utama
            container.innerHTML = htmlContent;
            
            // Sembunyikan loading, tampilkan kontainer
            loading.classList.add('hidden');
            container.classList.remove('hidden');
            
            // Re-render Ikon Lucide setelah elemen HTML baru masuk
            lucide.createIcons();
        }

        /* ====================================================================
           LOGIKA ANIMASI ACCORDION (TIDAK DIUBAH FUNGSINYA)
        ==================================================================== */
        function toggleAccordion(contentId, iconId) {
            const content = document.getElementById(contentId);
            const icon = document.getElementById(iconId);
            
            if (content.style.maxHeight) {
                // Tutup Accordion
                content.style.maxHeight = null;
                content.style.opacity = 0;
                icon.style.transform = 'rotate(0deg)';
                
                setTimeout(() => {
                    icon.innerHTML = '<i data-lucide="plus" class="w-5 h-5 md:w-7 md:h-7"></i>';
                    lucide.createIcons();
                }, 150);
            } else {
                // Buka Accordion
                content.style.maxHeight = content.scrollHeight + "px";
                content.style.opacity = 1;
                icon.style.transform = 'rotate(45deg)'; 
                
                setTimeout(() => {
                    icon.innerHTML = '<i data-lucide="x" class="w-5 h-5 md:w-7 md:h-7"></i>';
                    lucide.createIcons();
                }, 150);
            }
        }
    </script>
</body>
</html>
